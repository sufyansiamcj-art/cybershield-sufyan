<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>CyberShield | سفيان إبراهيم</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f1f5f9; font-family: 'Segoe UI', sans-serif; }
        .hero { background: #1e293b; color: white; padding: 40px 0; border-radius: 0 0 30px 30px; }
        .card-custom { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn-primary { background: #3b82f6; border: none; border-radius: 8px; }
    </style>
</head>
<body>

<div class="hero text-center mb-5">
    <h2><i class="fas fa-user-shield me-2"></i> CyberShield Dashboard</h2>
    <p>أداة الفحص الأمني المتطورة - م. سفيان إبراهيم</p>
</div>

<div class="container">
    <div class="row">
        <div class="col-lg-5 mb-4">
            <div class="card card-custom p-4">
                <h5 class="mb-3">فحص جديد</h5>
                <form method="POST">
                    <div class="input-group">
                        <input type="text" name="url" class="form-control" placeholder="google.com" required>
                        <button class="btn btn-primary" type="submit">بدء</button>
                    </div>
                </form>

                {% if results %}
                <div class="mt-4">
                    <h6 class="text-muted">النتائج الفورية:</h6>
                    {% for item in results %}
                    <div class="alert alert-light border py-2 small">{{ item }}</div>
                    {% endfor %}
                </div>
                {% endif %}
            </div>
        </div>

        <div class="col-lg-7">
            <div class="card card-custom p-4">
                <h5 class="mb-3"><i class="fas fa-history"></i> السجل والتقارير</h5>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>الموقع</th>
                                <th>التاريخ</th>
                                <th>التقرير</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for row in history %}
                            <tr>
                                <td><small class="fw-bold">{{ row[0] }}</small></td>
                                <td><small class="text-muted">{{ row[1] }}</small></td>
                                <td>
                                    <a href="/download/{{ row[3] }}" class="btn btn-sm btn-outline-danger">
                                        <i class="fas fa-file-pdf"></i> تحميل PDF
                                    </a>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
